services:
  app-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/jsonhelper}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:?请在 .env 中配置 SPRING_DATASOURCE_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO:-validate}
      - JWT_SECRET=${JWT_SECRET:?请在 .env 中配置 JWT_SECRET}
      - ADMIN_BOOTSTRAP_ENABLED=${ADMIN_BOOTSTRAP_ENABLED:-false}
      - ADMIN_BOOTSTRAP_USERNAME=${ADMIN_BOOTSTRAP_USERNAME:-}
      - ADMIN_BOOTSTRAP_PASSWORD=${ADMIN_BOOTSTRAP_PASSWORD:-}
      - ADMIN_BOOTSTRAP_EMAIL=${ADMIN_BOOTSTRAP_EMAIL:-admin@example.com}
      - FILE_UPLOAD_DIR=/app/uploads
      - FILE_MAX_UPLOAD_SIZE_BYTES=${FILE_MAX_UPLOAD_SIZE_BYTES:-52428800}
      - FILE_MAX_PREVIEW_SIZE_BYTES=${FILE_MAX_PREVIEW_SIZE_BYTES:-2097152}
      - FILE_ALLOWED_EXTENSIONS=${FILE_ALLOWED_EXTENSIONS:-.conf,.config,.css,.csv,.env,.geojson,.har,.html,.ini,.java,.js,.json,.json5,.jsonc,.jsonl,.jsx,.log,.map,.md,.ndjson,.properties,.sql,.topojson,.toml,.ts,.tsx,.txt,.webmanifest,.xml,.yaml,.yml}
    volumes:
      - upload-data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  app-frontend:
    build:
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
      args:
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
    # Public traffic is owned by the independent markz-edge project.
    expose:
      - "80"
    environment:
      - STATIC_ASSET_RETENTION_DAYS=${STATIC_ASSET_RETENTION_DAYS:-14}
    volumes:
      - frontend-static:/usr/share/nginx/html
      - ${ZHANGJIHAO_STATIC_ROOT:-/home/markz/code/jihao}:/usr/share/nginx/zhangjihao:ro
      - /www/server/panel/vhost/cert/39.97.237.248:/etc/nginx/ssl:ro
    depends_on:
      - app-backend
    networks:
      - app-network
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-jsonhelper}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?请在 .env 中配置 POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-postgres}\" -d \"$${POSTGRES_DB:-jsonhelper}\"" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
  upload-data:
  frontend-static:

name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_BUILD_RETRIES: '3'

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Version consistency
        working-directory: .
        run: node scripts/ci/check-version-consistency.mjs

      - name: Repository neutrality
        working-directory: .
        run: node scripts/ci/check-repository-neutrality.mjs

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Maintainability budgets
        working-directory: .
        run: node scripts/ci/check-maintainability-budgets.mjs

      - name: Dependency security audit
        run: npm run audit:security

      - name: Unit tests
        run: npm test

      - name: Node script unit tests
        working-directory: .
        run: node --test scripts/ci/*.test.mjs

      - name: MCP server unit tests
        working-directory: .
        run: node --test scripts/mcp/*.test.mjs

      - name: Project plugin probe tests
        working-directory: .
        run: node --test plugins/ai-infra-controller-probe/skills/probe-codex-controller-runtime/scripts/*.test.mjs

      - name: Project plugin config auditor tests
        working-directory: .
        run: python3 -B -m unittest discover -s plugins/codex-mcp-config-auditor/scripts -p 'test_*.py'

      - name: AI evolution evals
        working-directory: .
        run: node scripts/ci/check-ai-evolution-evals.mjs

      - name: AI governance artifacts
        if: always()
        working-directory: .
        run: node scripts/ci/write-ai-governance-artifacts.mjs

      - name: Upload AI governance artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-governance-reports
          path: artifacts/ai-governance
          if-no-files-found: warn
          retention-days: 7

      - name: Chunk load recovery catch audit
        working-directory: .
        run: node scripts/ci/check-chunk-load-recovery-catches.mjs

      - name: Scheme corpus baseline
        run: npm run corpus:scheme

      - name: Scheme corpus quality snapshot
        run: npm run corpus:snapshot:check -- --output ../artifacts/scheme-corpus-quality-snapshot.json --summary "$GITHUB_STEP_SUMMARY"

      - name: Scheme corpus quality trend
        run: npm run corpus:snapshot:diff -- --before fixtures/scheme-corpus/corpus-quality.baseline.snapshot.json --after ../artifacts/scheme-corpus-quality-snapshot.json --strict --resource-type-drop video=20 --resource-type-rise lottie=20 --output ../artifacts/scheme-corpus-quality-trend.json --summary "$GITHUB_STEP_SUMMARY"

      - name: Scheme performance budget
        run: npm run perf:scheme -- --iterations 3 --strict --output ../artifacts/scheme-performance-budget.json --summary "$GITHUB_STEP_SUMMARY"

      - name: JSONPath performance budget
        run: npm run perf:jsonpath -- --iterations 3 --strict --output ../artifacts/jsonpath-performance-budget.json --summary "$GITHUB_STEP_SUMMARY"

      - name: Upload scheme corpus quality snapshot
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scheme-corpus-quality-snapshot
          path: artifacts/scheme-corpus-quality-snapshot.json
          if-no-files-found: warn
          retention-days: 7

      - name: Upload scheme corpus quality trend
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scheme-corpus-quality-trend
          path: artifacts/scheme-corpus-quality-trend.json
          if-no-files-found: warn
          retention-days: 7

      - name: Upload scheme performance budget
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scheme-performance-budget
          path: artifacts/scheme-performance-budget.json
          if-no-files-found: warn
          retention-days: 7

      - name: Upload JSONPath performance budget
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: jsonpath-performance-budget
          path: artifacts/jsonpath-performance-budget.json
          if-no-files-found: warn
          retention-days: 7

      - name: Production build
        run: npm run build

      - name: Preload boundary check
        run: npm run check:preloads

      - name: Static asset retention check
        working-directory: .
        run: node scripts/ci/check-frontend-static-retention.mjs

      - name: Deploy shell syntax check
        working-directory: .
        run: node scripts/ci/check-deploy-shell-syntax.mjs

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Browser Worker E2E performance budget
        env:
          PLAYWRIGHT_PREBUILT: '1'
          BROWSER_WORKER_PERF_OUTPUT: ../artifacts/browser-worker-performance-budget.json
        run: BROWSER_WORKER_PERF_SUMMARY="$GITHUB_STEP_SUMMARY" npm run perf:e2e

      - name: Upload browser Worker performance budget
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-worker-performance-budget
          path: artifacts/browser-worker-performance-budget.json
          if-no-files-found: warn
          retention-days: 7

      - name: E2E smoke tests
        env:
          PLAYWRIGHT_PREBUILT: '1'
        run: npm run test:e2e

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: AI governance coverage
        working-directory: .
        run: node scripts/ci/check-ai-governance.mjs

      - name: AI asset HEAD distribution
        working-directory: .
        run: node scripts/ci/check-ai-asset-distribution.mjs --head

      - name: Maven test
        run: mvn -B test

      - name: Backend API matrix coverage
        working-directory: .
        run: node scripts/ci/check-backend-api-matrix.mjs

      - name: Maven package
        run: mvn -B package -DskipTests

      - name: Upload backend jar
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build backend image
        run: bash .github/scripts/docker-build-with-retry.sh json-utils-backend:ci ./backend

      - name: Build frontend image
        run: bash .github/scripts/docker-build-with-retry.sh json-utils-frontend:ci ./frontend

      - name: Validate compose config
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          SPRING_DATASOURCE_PASSWORD: ci-postgres-password
          JWT_SECRET: ci-jwt-secret-for-compose-validation
        run: docker compose -f docker-compose.yml config

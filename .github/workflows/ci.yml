name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_BUILD_RETRIES: '3'

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Scheme corpus baseline
        run: npm run corpus:scheme

      - name: Production build
        run: npm run build

      - name: Preload boundary check
        run: npm run check:preloads

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        env:
          PLAYWRIGHT_PREBUILT: '1'
        run: npm run test:e2e

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Maven test
        run: mvn -B test

      - name: Maven package
        run: mvn -B package -DskipTests

      - name: Upload backend jar
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build backend image
        run: bash .github/scripts/docker-build-with-retry.sh json-utils-backend:ci ./backend

      - name: Build frontend image
        run: bash .github/scripts/docker-build-with-retry.sh json-utils-frontend:ci ./frontend

      - name: Validate compose config
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          SPRING_DATASOURCE_PASSWORD: ci-postgres-password
          JWT_SECRET: ci-jwt-secret-for-compose-validation
        run: docker compose -f docker-compose.yml config

name: AI Governance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  ai-governance:
    name: AI Governance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      attestation-subject-digest: ${{ steps.upload-attestation-subject.outputs.artifact-digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Version consistency
        run: node scripts/ci/check-version-consistency.mjs

      - name: Node script unit tests
        run: node --test scripts/ci/*.test.mjs

      - name: MCP server unit tests
        run: node --test scripts/mcp/*.test.mjs

      - name: Project plugin probe tests
        run: node --test plugins/ai-infra-controller-probe/skills/probe-codex-controller-runtime/scripts/*.test.mjs

      - name: Project plugin config auditor tests
        run: python3 -B -m unittest discover -s plugins/codex-mcp-config-auditor/scripts -p 'test_*.py'

      - name: AI evolution evals
        run: node scripts/ci/check-ai-evolution-evals.mjs

      - name: AI asset HEAD distribution
        run: node scripts/ci/check-ai-asset-distribution.mjs --head

      - name: AI governance artifacts
        run: node scripts/ci/write-ai-governance-artifacts.mjs

      - name: Upload AI governance artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-governance-reports
          path: artifacts/ai-governance
          if-no-files-found: warn
          retention-days: 14

      - name: Upload attestation subject
        id: upload-attestation-subject
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: artifacts/ai-governance/ai-governance-attestation-subject.json
          archive: false
          if-no-files-found: error
          retention-days: 14

  attest-ai-governance-evidence:
    name: Attest AI Governance Evidence
    needs: ai-governance
    if: ${{ github.repository == 'zhang99667/jsonUtil' && github.ref == 'refs/heads/main' && vars.AI_GOVERNANCE_ATTESTATION_ENABLED == 'true' }}
    environment: ai-governance-attestation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Attest fixed subject digest
        id: attest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-name: ai-governance-attestation-subject.json
          subject-digest: sha256:${{ needs.ai-governance.outputs.attestation-subject-digest }}

      - name: Upload Sigstore bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ${{ steps.attest.outputs.bundle-path }}
          archive: false
          if-no-files-found: error
          retention-days: 14

name: Bug 报告
description: 报告一个 bug 帮助我们改进
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间填写此 bug 报告！

  - type: textarea
    id: bug-description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述这个 bug
      placeholder: 告诉我们发生了什么...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现这个问题
      placeholder: |
        1. 打开 '...'
        2. 点击 '...'
        3. 滚动到 '...'
        4. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 描述你期望发生什么
      placeholder: 应该看到...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生了什么
      placeholder: 实际上看到了...
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: 版本
      description: 你使用的是哪个版本？
      options:
        - Web 版本
        - Electron 桌面版 (macOS)
        - Electron 桌面版 (Windows)
        - Electron 桌面版 (Linux)
    validations:
      required: true

  - type: dropdown
    id: browsers
    attributes:
      label: 浏览器 (如果是 Web 版本)
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - 其他

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果适用，添加截图帮助解释问题

  - type: textarea
    id: logs
    attributes:
      label: 错误日志
      description: 请粘贴任何相关的错误日志
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 添加关于问题的任何其他上下文

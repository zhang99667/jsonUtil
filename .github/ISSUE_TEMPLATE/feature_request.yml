name: 功能请求
description: 为这个项目提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提出改进建议！

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 清晰地描述这个功能要解决什么问题
      placeholder: 我总是感到沮丧，当...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案
      description: 描述你希望实现的功能
      placeholder: 我希望能够...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 描述你考虑过的任何替代解决方案或功能

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 这个功能对你有多重要？
      options:
        - 低 - 有就更好
        - 中 - 会改善体验
        - 高 - 非常需要
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 添加关于功能请求的任何其他上下文或截图

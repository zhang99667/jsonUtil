spring:
  application:
    name: json-helper-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jsonhelper}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:50MB}

server:
  port: 8080

# 文件上传目录配置
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}
  max-upload-size: ${FILE_MAX_UPLOAD_SIZE_BYTES:52428800}
  max-preview-size: ${FILE_MAX_PREVIEW_SIZE_BYTES:2097152}
  allowed-extensions: ${FILE_ALLOWED_EXTENSIONS:.conf,.config,.css,.csv,.env,.geojson,.har,.html,.ini,.java,.js,.json,.json5,.jsonc,.jsonl,.jsx,.log,.map,.md,.ndjson,.properties,.sql,.topojson,.toml,.ts,.tsx,.txt,.webmanifest,.xml,.yaml,.yml}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:86400000} # 1 day

# 管理员初始化默认关闭，避免生产环境出现固定默认账号
admin:
  bootstrap:
    enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
    username: ${ADMIN_BOOTSTRAP_USERNAME:}
    password: ${ADMIN_BOOTSTRAP_PASSWORD:}
    email: ${ADMIN_BOOTSTRAP_EMAIL:admin@example.com}

spring:
  application:
    name: json-helper-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jsonhelper}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

# 文件上传目录配置
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:D+d8lKHErzwkqdz29GvxwV/O3SEw6uMvdNk181jFfP8NQDSN4R0iWNAjI5h/Lazf9SnPULCNU83s73yfMxbTZg==}
  expiration: ${JWT_EXPIRATION:86400000} # 1 day
